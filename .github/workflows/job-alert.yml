name: Job Alert Bot

on:
  schedule:
    # Runs every hour from 8–12 IST (UTC 2:30–6:30)
    - cron: '30 2-6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run Job Alert Bot
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: node server.js
